<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }

    body.light {
      background: #f0f4f8;
      color: #1a1a2e;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 2px;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.8rem;
      color: #a8dadc;
    }

    body.light #status {
      color: #0f3460;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    body.light .cell {
      background: #dce8f5;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    body.light .cell:hover:not(.taken) {
      background: #a8c8ea;
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    body.light .cell.o { color: #0f3460; }

    .cell.win {
      background: #0f3460;
      animation: pulse 0.5s ease;
    }

    body.light .cell.win {
      background: #a8c8ea;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    #restart {
      margin-top: 2rem;
      padding: 0.7rem 2rem;
      font-size: 1rem;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s;
    }

    #restart:hover { background: #c73652; }

    #score {
      display: flex;
      gap: 2rem;
      margin-bottom: 1.5rem;
      font-size: 1rem;
    }

    .score-box {
      text-align: center;
      background: #16213e;
      padding: 0.5rem 1.2rem;
      border-radius: 8px;
      transition: background 0.3s;
    }

    body.light .score-box {
      background: #dce8f5;
    }

    .score-box span {
      display: block;
      font-size: 1.6rem;
      font-weight: bold;
    }

    .score-box.x-score span { color: #e94560; }
    .score-box.draw-score span { color: #aaa; }
    .score-box.o-score span { color: #a8dadc; }

    body.light .score-box.o-score span { color: #0f3460; }
    body.light .score-box.draw-score span { color: #666; }

    #theme-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      background: #16213e;
      color: #eee;
      border: none;
      border-radius: 20px;
      padding: 0.4rem 1rem;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.3s, color 0.3s;
    }

    body.light #theme-toggle {
      background: #dce8f5;
      color: #1a1a2e;
    }

    #theme-toggle:hover {
      opacity: 0.85;
    }
  </style>
</head>
<body>

  <button id="theme-toggle">☀️ Light Mode</button>

  <h1>Tic Tac Toe</h1>

  <div id="score">
    <div class="score-box x-score">X<span id="score-x">0</span></div>
    <div class="score-box draw-score">Unentschieden<span id="score-draw">0</span></div>
    <div class="score-box o-score">O<span id="score-o">0</span></div>
  </div>

  <div id="status">Spieler X ist dran</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <button id="restart">Neu starten</button>

  <script>
    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');
    const scoreX = document.getElementById('score-x');
    const scoreO = document.getElementById('score-o');
    const scoreDraw = document.getElementById('score-draw');

    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, gameOver, scores;

    function init() {
      board = Array(9).fill('');
      current = 'X';
      gameOver = false;
      cells.forEach(c => {
        c.textContent = '';
        c.className = 'cell';
      });
      status.textContent = `Spieler X ist dran`;
    }

    function checkWin() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return [a, b, c];
        }
      }
      return null;
    }

    cells.forEach(cell => {
      cell.addEventListener('click', () => {
        const i = +cell.dataset.i;
        if (gameOver || board[i]) return;

        board[i] = current;
        cell.textContent = current;
        cell.classList.add(current.toLowerCase(), 'taken');

        const win = checkWin();
        if (win) {
          gameOver = true;
          win.forEach(idx => cells[idx].classList.add('win'));
          status.textContent = `Spieler ${current} gewinnt!`;
          if (current === 'X') scoreX.textContent = +scoreX.textContent + 1;
          else scoreO.textContent = +scoreO.textContent + 1;
        } else if (board.every(Boolean)) {
          gameOver = true;
          status.textContent = 'Unentschieden!';
          scoreDraw.textContent = +scoreDraw.textContent + 1;
        } else {
          current = current === 'X' ? 'O' : 'X';
          status.textContent = `Spieler ${current} ist dran`;
        }
      });
    });

    document.getElementById('restart').addEventListener('click', init);

    const themeToggle = document.getElementById('theme-toggle');
    themeToggle.addEventListener('click', () => {
      document.body.classList.toggle('light');
      const isLight = document.body.classList.contains('light');
      themeToggle.textContent = isLight ? '🌙 Dark Mode' : '☀️ Light Mode';
    });

    init();
  </script>
</body>
</html>
